<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Los Cuates - Cocina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="sistema.css">
    <style>
        .cocina-stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { background: var(--card-bg); border-radius: 10px; padding: 15px 25px; border: 1px solid var(--gray-dark); text-align: center; }
        .stat-numero { font-family: 'Bebas Neue', sans-serif; font-size: 2.5em; line-height: 1; }
        .stat-numero.pendiente  { color: var(--danger); }
        .stat-numero.preparando { color: var(--warning); }
        .stat-numero.listo      { color: var(--success); }
        .stat-label { font-size: 0.9em; color: var(--gray-light); margin-top: 5px; }
        .auto-refresh { display: flex; align-items: center; gap: 10px; color: var(--gray-light); font-size: 0.9em; }
        .auto-refresh input { accent-color: var(--rojo); }
        .tiempo-espera { font-size: 0.85em; color: var(--gray-light); margin-top: 5px; }
        .tiempo-espera.urgente { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>
    <header class="sistema-header">
        <div style="display:flex;align-items:center;gap:14px;">
            <img src="images/logo.jpeg" alt="Los Cuates" class="logo">
            <h1><i class="fas fa-fire-burner"></i> COCINA</h1>
        </div>
        <nav class="header-nav">
            <a href="pedidos.html" class="nav-btn">Pedidos</a>
            <a href="cocina.html" class="nav-btn active">Cocina</a>
            <a href="domicilio.html" class="nav-btn">Para Pago</a>
            <a href="cierre.html" class="nav-btn">Cierre</a>
            <a href="clientes.html" class="nav-btn">Clientes</a>
            <a href="inventario.html" class="nav-btn">Inventario</a>
            <a href="index.html" class="nav-btn">Menú</a>
            <button class="nav-btn" id="btnActualizarPrecios" onclick="actualizarPrecios()" title="Actualizar precios">🔄</button>
        </nav>
    </header>

    <div class="cocina-container">
        <div class="cocina-stats" id="stats">
            <div class="stat-box"><div class="stat-numero pendiente" id="statPendientes">0</div><div class="stat-label">Pendientes</div></div>
            <div class="stat-box"><div class="stat-numero preparando" id="statPreparando">0</div><div class="stat-label">Preparando</div></div>
            <div class="stat-box"><div class="stat-numero listo" id="statListos">0</div><div class="stat-label">Listos Hoy</div></div>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked>
                <label for="autoRefresh">Auto-actualizar cada 5s</label>
            </div>
        </div>
        <div class="cocina-grid" id="pedidosGrid"><div class="loading">Cargando pedidos</div></div>
    </div>

    <!-- Modal Editar -->
    <div class="modal-overlay" id="modalEditar" style="display:none;" onclick="cerrarModalOverlay(event)">
        <div class="modal-panel">
            <div class="modal-header">
                <span class="modal-titulo" id="modalTitulo">Editar Pedido</span>
                <button class="btn-cerrar-modal" onclick="cerrarModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-section-title">Productos actuales</div>
                <div id="modalItems"></div>
                <div class="modal-section-title" style="margin-top:15px;">Agregar productos</div>
                <div id="modalProductos"></div>
                <div class="modal-section-title" style="margin-top:15px;">Opciones del pedido</div>
                <div class="tipo-pedido-toggle" style="margin-bottom:10px;">
                    <div class="tipo-check" id="modalLlevarLabel" onclick="seleccionarTipoModal('llevar')"><i class="fas fa-bag-shopping"></i> Para llevar</div>
                    <div class="tipo-check" id="modalComerLabel" onclick="seleccionarTipoModal('comer')"><i class="fas fa-utensils"></i> Para comer acá</div>
                    <div class="tipo-check" id="modalDomicilioLabel" onclick="seleccionarTipoModal('domicilio')"><i class="fas fa-motorcycle"></i> Domicilio</div>
                </div>
                <textarea id="modalNotas" placeholder="Notas del pedido..." style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--gray-dark);background:rgba(44,24,16,0.9);color:var(--white);font-family:'Inter',sans-serif;resize:none;height:60px;"></textarea>
            </div>
            <div class="modal-footer">
                <div class="modal-total"><span>TOTAL:</span><span id="modalTotal">$0</span></div>
                <div class="modal-botones">
                    <button class="btn-estado btn-listo" id="btnGuardarEdicion" onclick="guardarEdicion()"><i class="fas fa-floppy-disk"></i> GUARDAR</button>
                    <button class="btn-limpiar" onclick="cerrarModal()" style="margin-top:0;"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="sistema.js"></script>
    <script>
        let pedidosActuales = [], intervaloRefresh = null, ultimoPedidoId = 0;

        function getTipoPedido(notas) {
            if (!notas) return null;
            if (notas.includes('[PARA LLEVAR]')) return 'llevar';
            if (notas.includes('[PARA COMER ACA]')) return 'comer';
            if (notas.includes('[DOMICILIO]')) return 'domicilio';
            return null;
        }

        function limpiarNotas(notas) {
            if (!notas) return '';
            return notas.replace('[PARA LLEVAR]','').replace('[PARA COMER ACA]','').replace('[DOMICILIO]','').replace('[AL COSTO]','').trim();
        }

        function badgeTipo(notas) {
            const tipo = getTipoPedido(notas);
            if (tipo === 'llevar')    return '<div class="tipo-badge llevar"><i class="fas fa-bag-shopping"></i> PARA LLEVAR</div>';
            if (tipo === 'comer')     return '<div class="tipo-badge comer"><i class="fas fa-utensils"></i> PARA COMER ACÁ</div>';
            if (tipo === 'domicilio') return '<div class="tipo-badge domicilio"><i class="fas fa-motorcycle"></i> DOMICILIO</div>';
            return '';
        }

        async function actualizarPrecios() {
            const btn = document.getElementById('btnActualizarPrecios');
            btn.textContent = '⏳'; btn.disabled = true;
            await CUATES.cargarProductos(true);
            btn.textContent = '🔄'; btn.disabled = false;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            if (!CUATES.apiConfigurada()) { CUATES.mostrarConfigPendiente(document.getElementById('pedidosGrid')); return; }
            await CUATES.cargarProductos();
            cargarPedidos();
            document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);
            toggleAutoRefresh();
        });

        function toggleAutoRefresh() {
            if (intervaloRefresh) { clearInterval(intervaloRefresh); intervaloRefresh = null; }
            if (document.getElementById('autoRefresh').checked) intervaloRefresh = setInterval(cargarPedidos, 5000);
        }

        async function cargarPedidos() {
            try {
                const resultado = await CUATES.getPedidosPendientes();
                if (resultado.error) throw new Error(resultado.error);
                const todosHoy = await CUATES.getPedidosHoy();
                const nuevos = resultado.pedidos.filter(p => p.id > ultimoPedidoId && p.estado === 'pendiente');
                if (nuevos.length > 0 && ultimoPedidoId > 0) { CUATES.reproducirSonido('nuevo'); CUATES.vibrar(300); }
                if (resultado.pedidos.length > 0) ultimoPedidoId = Math.max(...resultado.pedidos.map(p => p.id));
                pedidosActuales = resultado.pedidos;
                actualizarEstadisticas(resultado.pedidos, todosHoy.pedidos || []);
                renderizarPedidos(resultado.pedidos);
            } catch (error) {
                document.getElementById('pedidosGrid').innerHTML = `<div class="mensaje error">Error al cargar: ${error.message}</div>`;
            }
        }

        function actualizarEstadisticas(pendientes, todosHoy) {
            const hoy = CUATES.fechaHoy();
            const pedidosHoy = todosHoy.filter(p => p.fecha === hoy);
            const pendientesHoy = pendientes.filter(p => p.fecha === hoy);
            document.getElementById('statPendientes').textContent = pendientesHoy.filter(p => p.estado === 'pendiente').length;
            document.getElementById('statPreparando').textContent = pendientesHoy.filter(p => p.estado === 'preparando').length;
            document.getElementById('statListos').textContent = pedidosHoy.filter(p => p.estado === 'listo' || p.estado === 'entregado').length;
        }

        function renderizarPedidos(pedidos) {
            const grid = document.getElementById('pedidosGrid');
            if (pedidos.length === 0) { grid.innerHTML = '<div class="sin-datos"><i class="fas fa-check-circle"></i>No hay pedidos pendientes</div>'; return; }
            pedidos.sort((a, b) => {
                if (a.estado === 'pendiente' && b.estado !== 'pendiente') return -1;
                if (a.estado !== 'pendiente' && b.estado === 'pendiente') return 1;
                return a.id - b.id;
            });
            grid.innerHTML = pedidos.map(pedido => {
                const minutos = calcularTiempoEspera(pedido.hora);
                const urgente = minutos >= 10;
                return `<div class="pedido-card ${pedido.estado}">
                    <div class="pedido-header">
                        <div>
                            <div class="pedido-numero">#${pedido.id}</div>
                            <div class="pedido-hora"><i class="fas fa-clock"></i> ${formatearHora(pedido.hora)}</div>
                            <div class="tiempo-espera ${urgente ? 'urgente' : ''}">${minutos} min esperando</div>
                        </div>
                        <span class="pedido-estado ${pedido.estado}">${pedido.estado.toUpperCase()}</span>
                    </div>
                    <div class="pedido-lista">
                        ${pedido.items.map(item => `<div class="pedido-lista-item"><span><span class="item-cantidad">${item.cantidad}x</span><span class="item-nombre">${item.nombre}</span></span></div>`).join('')}
                    </div>
                    ${badgeTipo(pedido.notas)}
                    ${limpiarNotas(pedido.notas) ? `<div class="pedido-notas-cocina"><i class="fas fa-comment"></i> ${limpiarNotas(pedido.notas)}</div>` : ''}
                    <div class="pedido-acciones">${renderizarBotones(pedido)}</div>
                </div>`;
            }).join('');
        }

        function renderizarBotones(pedido) {
            if (pedido.estado === 'pendiente') return `<button class="btn-estado btn-preparando" onclick="cambiarEstado(${pedido.id},'preparando')"><i class="fas fa-fire"></i> PREPARANDO</button><button class="btn-editar" onclick="abrirEditar(${pedido.id})"><i class="fas fa-pen"></i></button>`;
            if (pedido.estado === 'preparando') return `<button class="btn-estado btn-listo" onclick="cambiarEstado(${pedido.id},'listo')"><i class="fas fa-check"></i> LISTO</button><button class="btn-editar" onclick="abrirEditar(${pedido.id})"><i class="fas fa-pen"></i></button>`;
            if (pedido.estado === 'listo') return `<button class="btn-estado btn-entregado" onclick="cambiarEstado(${pedido.id},'entregado')"><i class="fas fa-hand-holding"></i> ENTREGADO</button>`;
            return '';
        }

        function formatearHora(hora) {
            if (!hora) return '--:--';
            if (hora.match(/^\d{2}:\d{2}:\d{2}$/)) return hora.substring(0, 5);
            if (hora.includes('GMT') || hora.includes('T')) { try { return new Date(hora).toTimeString().substring(0, 5); } catch(e) { return '--:--'; } }
            if (hora.match(/^\d{2}:\d{2}$/)) return hora;
            return String(hora).substring(0, 5);
        }

        function calcularTiempoEspera(horaPedido) {
            try {
                if (!horaPedido) return 0;
                const ahora = new Date();
                let d;
                if (horaPedido.match(/^\d{2}:\d{2}(:\d{2})?$/)) {
                    const [h, m, s] = horaPedido.split(':').map(Number);
                    d = new Date(); d.setHours(h, m, s || 0);
                } else if (horaPedido.includes('GMT') || horaPedido.includes('T')) {
                    const tmp = new Date(horaPedido);
                    d = new Date(); d.setHours(tmp.getHours(), tmp.getMinutes(), tmp.getSeconds());
                } else { return 0; }
                return Math.max(0, Math.floor((ahora - d) / 60000));
            } catch(e) { return 0; }
        }

        let pedidoEditando = null;

        function abrirEditar(id) {
            const pedido = pedidosActuales.find(p => p.id === id);
            if (!pedido) return;
            const tipo = getTipoPedido(pedido.notas);
            pedidoEditando = { id: pedido.id, items: pedido.items.map(i => ({...i})), tipo, notas: limpiarNotas(pedido.notas) };
            document.getElementById('modalTitulo').textContent = `Editar Pedido #${pedido.id}`;
            document.getElementById('modalLlevarLabel').classList.toggle('activo', tipo === 'llevar');
            document.getElementById('modalComerLabel').classList.toggle('activo', tipo === 'comer');
            document.getElementById('modalDomicilioLabel').classList.toggle('activo', tipo === 'domicilio');
            document.getElementById('modalNotas').value = limpiarNotas(pedido.notas);
            renderizarModalItems(); renderizarModalProductos(); actualizarModalTotal();
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function seleccionarTipoModal(tipo) {
            if (pedidoEditando.tipo === tipo) {
                pedidoEditando.tipo = null;
                ['modalLlevarLabel','modalComerLabel','modalDomicilioLabel'].forEach(id => document.getElementById(id).classList.remove('activo'));
                return;
            }
            pedidoEditando.tipo = tipo;
            document.getElementById('modalLlevarLabel').classList.toggle('activo', tipo === 'llevar');
            document.getElementById('modalComerLabel').classList.toggle('activo', tipo === 'comer');
            document.getElementById('modalDomicilioLabel').classList.toggle('activo', tipo === 'domicilio');
        }

        function cerrarModal() { document.getElementById('modalEditar').style.display = 'none'; pedidoEditando = null; }
        function cerrarModalOverlay(e) { if (e.target === document.getElementById('modalEditar')) cerrarModal(); }

        function renderizarModalItems() {
            const c = document.getElementById('modalItems');
            if (pedidoEditando.items.length === 0) { c.innerHTML = '<p style="color:var(--danger);text-align:center;padding:10px;font-size:0.9em;">Agrega al menos un producto</p>'; return; }
            c.innerHTML = pedidoEditando.items.map(item => `
                <div class="pedido-item">
                    <div class="pedido-item-info"><div class="pedido-item-nombre">${item.nombre}</div><div class="pedido-item-precio">${CUATES.formatearPrecio(item.precio)} c/u</div></div>
                    <div class="pedido-item-controles">
                        <button class="cantidad-btn menos" onclick="modificarCantidadModal('${item.nombre}',-1)">-</button>
                        <span class="cantidad-numero">${item.cantidad}</span>
                        <button class="cantidad-btn mas" onclick="modificarCantidadModal('${item.nombre}',1)">+</button>
                    </div>
                </div>`).join('');
        }

        function renderizarModalProductos() {
            const c = document.getElementById('modalProductos');
            let html = '';
            Object.keys(CUATES.MENU).forEach(cat => {
                const prods = CUATES.MENU[cat];
                html += `<div class="categoria-titulo" style="font-size:1.05em;margin-top:10px;margin-bottom:8px;padding-bottom:5px;"><i class="fas ${CUATES.CATEGORIAS_ICONOS[cat]}"></i> ${CUATES.CATEGORIAS_NOMBRES[cat]}</div>
                <div class="productos-grid modal-productos-grid">
                    ${prods.map(p => `<button class="producto-btn" onclick="agregarProductoModal(event,'${p.nombre}',${p.precio})"><div class="producto-nombre">${p.nombre}</div><div class="producto-precio">${p.precio > 0 ? CUATES.formatearPrecio(p.precio) : 'Consultar'}</div></button>`).join('')}
                </div>`;
            });
            c.innerHTML = html;
        }

        function agregarProductoModal(event, nombre, precio) {
            const existente = pedidoEditando.items.find(i => i.nombre === nombre);
            if (existente) { existente.cantidad++; } else { pedidoEditando.items.push({ nombre, precio, cantidad: 1 }); }
            event.currentTarget.classList.add('added'); setTimeout(() => event.currentTarget.classList.remove('added'), 300);
            CUATES.vibrar(30); renderizarModalItems(); actualizarModalTotal();
        }

        function modificarCantidadModal(nombre, delta) {
            const item = pedidoEditando.items.find(i => i.nombre === nombre);
            if (!item) return;
            item.cantidad += delta;
            if (item.cantidad <= 0) pedidoEditando.items = pedidoEditando.items.filter(i => i.nombre !== nombre);
            CUATES.vibrar(30); renderizarModalItems(); actualizarModalTotal();
        }

        function actualizarModalTotal() {
            const total = pedidoEditando.items.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            document.getElementById('modalTotal').textContent = CUATES.formatearPrecio(total);
        }

        async function guardarEdicion() {
            if (pedidoEditando.items.length === 0) { alert('Agrega al menos un producto'); return; }
            const btn = document.getElementById('btnGuardarEdicion');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';
            const total = pedidoEditando.items.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            const notasTexto = document.getElementById('modalNotas').value.trim();
            const marcador = pedidoEditando.tipo === 'llevar' ? '[PARA LLEVAR]' : pedidoEditando.tipo === 'comer' ? '[PARA COMER ACA]' : pedidoEditando.tipo === 'domicilio' ? '[DOMICILIO]' : '';
            const notas = marcador ? `${marcador} ${notasTexto}` : notasTexto;
            try {
                const resultado = await CUATES.actualizarPedido(pedidoEditando.id, pedidoEditando.items, total, notas);
                if (resultado.success) { CUATES.reproducirSonido('success'); cerrarModal(); await cargarPedidos(); }
                else throw new Error(resultado.error || 'Error desconocido');
            } catch (error) {
                alert('Error al guardar: ' + error.message);
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-floppy-disk"></i> GUARDAR';
            }
        }

        async function cambiarEstado(id, nuevoEstado) {
            CUATES.vibrar();
            document.querySelectorAll('.pedido-card').forEach(card => {
                if (card.querySelector('.pedido-numero').textContent === `#${id}`) { card.style.opacity = '0.5'; card.style.pointerEvents = 'none'; }
            });
            try {
                const resultado = await CUATES.actualizarEstadoPedido(id, nuevoEstado);
                if (resultado.success) { CUATES.reproducirSonido('success'); await cargarPedidos(); }
                else throw new Error(resultado.error);
            } catch (error) { alert('Error al actualizar: ' + error.message); await cargarPedidos(); }
        }
    </script>
</body>
</html>
